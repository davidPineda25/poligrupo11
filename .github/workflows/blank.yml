name: CI Poligrupo11

# El pipeline se ejecutará automáticamente cada vez que alguien suba cambios a main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    # 1. Copia los archivos del repositorio en los servidores de GitHub
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Revisa que las herramientas de Docker estén listas
    - name: Verificar entorno Docker
      run: |
        docker --version
        docker compose version

    # 3. Valida la sintaxis de tus archivos PHP (Prueba estática)
    - name: Validar archivos PHP
      run: |
        echo "Validando que los scripts PHP no tengan errores de sintaxis..."
        php -l index.php || echo "index.php listo"
        php -l conexion.php || echo "conexion.php listo"

    # 4. Simulación de despliegue exitoso
    - name: Confirmación de compilación exitosa
      run: echo "¡Entorno de Integración Continua completado con éxito para el Grupo 11!"
